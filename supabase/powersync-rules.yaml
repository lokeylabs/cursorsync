# PowerSync Sync Streams for cursorsync (edition 3 — deployed format).
# Each authenticated user syncs only their own rows (owner_id = their auth subject). This covers
# EVERYTHING Cursor stores — every cursorDiskKV + ItemTable row flows through the single table.

config:
  edition: 3

streams:
  chats:
    auto_subscribe: true
    queries:
      - SELECT * FROM cursor_kv WHERE owner_id = auth.user_id()
